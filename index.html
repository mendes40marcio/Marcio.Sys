<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARCIO.SYS — Study OS v5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

/* ═══════════════════════════════════════
   ROOT VARIABLES
═══════════════════════════════════════ */
:root {
  --bg:      #030609;
  --bg2:     #060c12;
  --bg3:     #080f18;
  --panel:   #0a1520;
  --panel2:  #0d1b28;
  --glass:   rgba(10,21,32,0.85);
  --border:  rgba(0,220,255,0.15);
  --border2: rgba(0,220,255,0.08);
  --cyan:    #00dcff;
  --cyan2:   #00b4d8;
  --cyan3:   #48cae4;
  --orange:  #ff6b35;
  --orange2: #ff8c55;
  --green:   #00ff88;
  --green2:  #39ff14;
  --yellow:  #ffd60a;
  --red:     #ff2d55;
  --purple:  #b14aed;
  --blue:    #4361ee;
  --text:    #a8d8e8;
  --text2:   #6a9ab0;
  --dim:     #2a4a5a;
  --dim2:    #162030;
  --glow-c:  rgba(0,220,255,0.25);
  --glow-o:  rgba(255,107,53,0.25);
  --glow-g:  rgba(0,255,136,0.25);
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  height: 100vh; width: 100vw;
  overflow: hidden;
  cursor: default;
}

/* ── GLOBAL SCROLLBAR ── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background: var(--dim2); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background: var(--cyan2); }

/* ── SCANLINES ── */
body::before {
  content:''; position:fixed; inset:0; z-index:9998; pointer-events:none;
  background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,220,255,0.008) 3px,rgba(0,220,255,0.008) 4px);
}

/* ── GRID MESH BG ── */
.mesh {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,220,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,220,255,0.02) 1px, transparent 1px);
  background-size: 50px 50px;
}
.mesh::after {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 0%, rgba(0,100,200,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 100%, rgba(180,60,255,0.05) 0%, transparent 60%);
}

/* ═══════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════════ */
#app {
  position:relative; z-index:1;
  width:100vw; height:100vh;
  display:grid;
  grid-template-rows: 44px 1fr;
  grid-template-columns: 240px 1fr;
  grid-template-areas: "tb tb" "sb main";
}

/* ═══════════════════════════════════════
   TITLEBAR
═══════════════════════════════════════ */
#titlebar {
  grid-area: tb;
  background: linear-gradient(90deg, #03080f 0%, #060d17 60%, #03080f 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px;
  position: relative; overflow: hidden;
  -webkit-app-region: drag;
}
#titlebar::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent 0%, var(--cyan) 30%, var(--purple) 70%, transparent 100%);
  opacity:.4; animation: tbLine 4s infinite;
}
@keyframes tbLine { 0%,100%{opacity:.2} 50%{opacity:.7} }

.tb-logo {
  font-family:'Orbitron',monospace; font-size:12px; font-weight:900;
  color:var(--cyan); letter-spacing:3px;
  text-shadow:0 0 12px var(--cyan), 0 0 24px rgba(0,220,255,.3);
  -webkit-app-region:no-drag; white-space:nowrap;
}
.tb-divider { width:1px; height:18px; background:var(--dim); flex-shrink:0; }
.tb-status {
  font-family:'Share Tech Mono',monospace; font-size:9px;
  color:var(--text2); letter-spacing:1px;
  display:flex; align-items:center; gap:6px;
}
.tb-led {
  width:6px; height:6px; border-radius:50%;
  background:var(--green2); box-shadow:0 0 6px var(--green2);
  animation: ledBlink 2s infinite;
}
@keyframes ledBlink { 0%,100%{opacity:1;box-shadow:0 0 6px var(--green2)} 50%{opacity:.3;box-shadow:none} }

/* AV BARS */
.av { display:flex; align-items:flex-end; gap:2px; height:16px; }
.av-b {
  width:2px; background:var(--cyan); border-radius:1px; opacity:.7;
  animation: avUp 1s infinite ease-in-out;
}
.av-b:nth-child(1){height:5px;animation-delay:0s}
.av-b:nth-child(2){height:10px;animation-delay:.1s}
.av-b:nth-child(3){height:7px;animation-delay:.2s}
.av-b:nth-child(4){height:13px;animation-delay:.05s}
.av-b:nth-child(5){height:8px;animation-delay:.15s}
.av-b:nth-child(6){height:11px;animation-delay:.25s}
@keyframes avUp{0%,100%{transform:scaleY(.3);opacity:.3}50%{transform:scaleY(1);opacity:.9}}
.av.stopped .av-b { animation-play-state:paused; opacity:.2; }

.tb-right { margin-left:auto; display:flex; align-items:center; gap:12px; -webkit-app-region:no-drag; }
.tb-datetime {
  display:flex; flex-direction:column; align-items:flex-end;
}
.tb-time { font-family:'Orbitron',monospace; font-size:13px; font-weight:600; color:var(--cyan); letter-spacing:2px; }
.tb-date { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text2); letter-spacing:1px; }

.win-controls { display:flex; gap:5px; }
.wc { width:12px; height:12px; border-radius:50%; border:none; cursor:pointer; transition:.2s; }
.wc:hover{transform:scale(1.2)}
.wc-r{background:#ff5f57}
.wc-y{background:#febc2e}
.wc-g{background:#28c840}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
#sidebar {
  grid-area: sb;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction:column;
  overflow: hidden;
}

/* ── TIMER SECTION ── */
.sb-timer {
  padding: 14px 12px 10px;
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
}
.sb-sec-lbl {
  font-family:'Share Tech Mono',monospace; font-size:8px;
  color:var(--orange); letter-spacing:3px; text-transform:uppercase;
  margin-bottom:8px; opacity:.8;
}

.ring-wrap { position:relative; width:130px; height:130px; margin:0 auto 10px; }
.ring-svg { position:absolute; inset:0; transform:rotate(-90deg); }
.r-track { fill:none; stroke:var(--dim2); stroke-width:8; }
.r-fill  {
  fill:none; stroke:var(--cyan); stroke-width:8; stroke-linecap:round;
  stroke-dasharray:376; stroke-dashoffset:0;
  filter:drop-shadow(0 0 8px var(--cyan));
  transition:stroke-dashoffset 1s linear, stroke .4s, filter .4s;
}
.ring-inner {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.r-digits {
  font-family:'Orbitron',monospace; font-size:28px; font-weight:700;
  color:var(--cyan); text-shadow:0 0 14px var(--cyan); line-height:1;
}
.r-mode-lbl {
  font-family:'Share Tech Mono',monospace; font-size:7px;
  color:var(--text2); letter-spacing:2px; margin-top:3px;
}

.mode-row { display:flex; gap:3px; justify-content:center; margin-bottom:8px; }
.mpill {
  font-family:'Share Tech Mono',monospace; font-size:8px;
  padding:3px 7px; border:1px solid var(--dim); color:var(--dim);
  background:transparent; cursor:pointer; transition:.2s; letter-spacing:1px;
}
.mpill.active { border-color:var(--cyan); color:var(--cyan); background:rgba(0,220,255,.08); }
.mpill:hover:not(.active) { border-color:var(--cyan3); color:var(--cyan3); }

.t-btns { display:flex; gap:5px; justify-content:center; }
.t-main {
  font-family:'Orbitron',monospace; font-size:9px; font-weight:700;
  padding:7px 16px; border:1px solid var(--cyan); color:var(--cyan);
  background:rgba(0,220,255,.08); cursor:pointer; letter-spacing:2px;
  transition:.2s;
}
.t-main:hover { background:rgba(0,220,255,.2); box-shadow:0 0 12px var(--glow-c); }
.t-rst {
  font-family:'Share Tech Mono',monospace; font-size:8px;
  padding:7px 10px; border:1px solid var(--dim); color:var(--dim);
  background:transparent; cursor:pointer; transition:.2s;
}
.t-rst:hover { border-color:var(--orange); color:var(--orange); }

.sess-row {
  display:flex; align-items:center; justify-content:center; gap:6px;
  margin-top:8px; padding-top:8px; border-top:1px solid var(--border2);
}
.sess-lbl { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text2); }
.sdots { display:flex; gap:4px; }
.sdot { width:9px; height:9px; border-radius:2px; border:1px solid var(--dim); transition:.3s; }
.sdot.lit { background:var(--orange); border-color:var(--orange); box-shadow:0 0 6px var(--orange); }

/* ── NAV SECTION ── */
.sb-nav-lbl {
  font-family:'Share Tech Mono',monospace; font-size:8px;
  color:var(--orange); letter-spacing:3px;
  padding:8px 12px 4px; opacity:.8;
}
.sb-nav { flex:1; overflow-y:auto; }

.nav-item {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px; cursor:pointer;
  border-left:2px solid transparent;
  transition:.2s; position:relative;
}
.nav-item:hover { background:rgba(0,220,255,.04); }
.nav-item.active { background:rgba(0,220,255,.08); border-left-color:var(--cyan); }
.ni-icon { font-size:14px; flex-shrink:0; }
.ni-info { flex:1; min-width:0; }
.ni-title {
  font-family:'Share Tech Mono',monospace; font-size:9px;
  color:var(--text); letter-spacing:1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.nav-item.active .ni-title { color:var(--cyan); }
.ni-sub { font-size:9px; color:var(--text2); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ni-badge {
  font-family:'Share Tech Mono',monospace; font-size:7px;
  padding:2px 5px; font-weight:bold; flex-shrink:0;
}
.badge-active  { background:var(--cyan); color:#000; }
.badge-done    { background:var(--green); color:#000; }
.badge-next    { background:var(--purple); color:#fff; }
.badge-pending { background:var(--orange); color:#000; }
.badge-warn    { background:var(--yellow); color:#000; }

/* ── PROGRESS SECTION ── */
.sb-prog {
  padding:10px 12px;
  border-top:1px solid var(--border2);
  flex-shrink:0;
}
.prog-item { margin-bottom:7px; }
.prog-item:last-child{margin-bottom:0}
.prog-row {
  display:flex; justify-content:space-between;
  font-family:'Share Tech Mono',monospace; font-size:8px;
  color:var(--text2); margin-bottom:3px;
}
.prog-row span:last-child { color:var(--text); }
.pbar { height:3px; background:var(--dim2); position:relative; }
.pfill { height:100%; transition:width 1.5s ease; position:relative; }
.pfill::after {
  content:''; position:absolute; right:-1px; top:-3px;
  width:7px; height:7px; border-radius:50%; background:inherit;
  box-shadow:0 0 5px currentColor;
}
.pc{background:var(--cyan)} .po{background:var(--orange)} .pg{background:var(--green)}
.pp{background:var(--purple)} .py{background:var(--yellow)} .pr{background:var(--red)}

/* ═══════════════════════════════════════
   MAIN AREA
═══════════════════════════════════════ */
#main {
  grid-area: main;
  display:flex; flex-direction:column;
  overflow:hidden; background:var(--bg3);
}

/* ── TAB BAR ── */
#tabbar {
  display:flex; align-items:center;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 16px; gap:0;
  overflow-x:auto; flex-shrink:0;
}
#tabbar::-webkit-scrollbar{height:0}
.tab-btn {
  font-family:'Share Tech Mono',monospace; font-size:9px;
  padding:10px 14px; border:none; background:transparent;
  color:var(--text2); cursor:pointer; white-space:nowrap;
  border-bottom:2px solid transparent; transition:.2s; letter-spacing:1px;
  display:flex; align-items:center; gap:5px;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-dot{width:5px;height:5px;border-radius:50%;background:var(--green2);box-shadow:0 0 4px var(--green2)}
.tab-dot.orange{background:var(--orange);box-shadow:0 0 4px var(--orange)}
.tab-dot.purple{background:var(--purple);box-shadow:0 0 4px var(--purple)}

/* ── CONTENT AREA ── */
#content { flex:1; overflow-y:auto; padding:16px 20px; }

/* ─ DASHBOARD VIEW ─ */
.dash-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:12px;
  margin-bottom:14px;
}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr 1fr}}

.stat-card {
  background:var(--panel); border:1px solid var(--border);
  padding:14px; position:relative; overflow:hidden;
  transition:.3s; cursor:default;
}
.stat-card:hover { border-color:rgba(0,220,255,.35); transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,0,0,.4); }
.stat-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.sc-cyan::before{background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.sc-orange::before{background:linear-gradient(90deg,transparent,var(--orange),transparent)}
.sc-green::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.sc-purple::before{background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.sc-yellow::before{background:linear-gradient(90deg,transparent,var(--yellow),transparent)}
.sc-red::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}

.sc-label { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text2); letter-spacing:2px; margin-bottom:6px; }
.sc-value { font-family:'Orbitron',monospace; font-size:22px; font-weight:700; line-height:1; }
.sc-sub { font-size:10px; color:var(--text2); margin-top:4px; }
.sc-icon { position:absolute; right:12px; top:12px; font-size:20px; opacity:.3; }
.sc-bar { margin-top:8px; height:3px; background:var(--dim2); }
.sc-bar-fill { height:100%; transition:width 1.5s ease; }

/* ─ COURSERA VIEW ─ */
.course-list { display:flex; flex-direction:column; gap:10px; }
.course-card {
  background:var(--panel); border:1px solid var(--border);
  padding:14px 16px; display:flex; align-items:center; gap:14px;
  transition:.2s; position:relative; overflow:hidden;
}
.course-card:hover{border-color:rgba(0,220,255,.3);background:var(--panel2)}
.course-card::after {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
}
.cc-done::after{background:var(--green)}
.cc-active::after{background:var(--cyan);animation:pulse2 2s infinite}
.cc-next::after{background:var(--purple)}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}

.cc-num {
  font-family:'Orbitron',monospace; font-size:10px; font-weight:700;
  color:var(--text2); flex-shrink:0; min-width:30px;
}
.cc-status-icon{font-size:20px;flex-shrink:0}
.cc-info{flex:1;min-width:0}
.cc-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--text)}
.cc-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);margin-top:2px}
.cc-prog-bar{margin-top:8px;height:4px;background:var(--dim2);position:relative}
.cc-prog-fill{height:100%;transition:width 1.5s ease;position:relative}
.cc-prog-fill::after{
  content:'';position:absolute;right:-2px;top:-3px;
  width:8px;height:8px;border-radius:50%;background:inherit;
  box-shadow:0 0 6px currentColor;
}
.cc-badge{
  font-family:'Share Tech Mono',monospace;font-size:8px;
  padding:4px 8px;flex-shrink:0;
}
.cc-action{
  font-family:'Orbitron',monospace;font-size:9px;font-weight:700;
  padding:7px 14px;border:1px solid;background:transparent;
  cursor:pointer;letter-spacing:1px;transition:.2s;flex-shrink:0;
}
.cc-action.resume{border-color:var(--cyan);color:var(--cyan)}
.cc-action.resume:hover{background:rgba(0,220,255,.15);box-shadow:0 0 10px var(--glow-c)}
.cc-action.done-btn{border-color:var(--green);color:var(--green)}
.cc-action.linked{border-color:var(--blue);color:var(--blue)}
.cc-action.linked:hover{background:rgba(67,97,238,.15)}
.cc-deadline{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:var(--yellow);padding:3px 8px;border:1px solid rgba(255,214,10,.3);
  background:rgba(255,214,10,.06);margin-top:6px;display:inline-block;
}

/* ─ HORAS COMPLEMENTARES VIEW ─ */
.horas-header{
  background:var(--panel);border:1px solid var(--border);
  padding:16px;margin-bottom:12px;position:relative;overflow:hidden;
}
.horas-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--orange),var(--cyan),transparent);
}
.horas-big-bar{
  background:var(--dim2);height:8px;border-radius:0;margin:10px 0 6px;
  position:relative;overflow:visible;
}
.horas-big-fill{
  height:100%;
  background:linear-gradient(90deg,var(--cyan),var(--orange));
  transition:width 1.5s ease;position:relative;
}
.horas-big-fill::after{
  content:'';position:absolute;right:0;top:-4px;
  width:16px;height:16px;border-radius:50%;
  background:var(--orange);box-shadow:0 0 10px var(--orange);
  animation:pulse3 2s infinite;
}
@keyframes pulse3{0%,100%{box-shadow:0 0 8px var(--orange)}50%{box-shadow:0 0 20px var(--orange)}}
.horas-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.horas-stat{text-align:center}
.horas-num{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;line-height:1}
.horas-sub{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text2);letter-spacing:1px}

.comp-table{
  background:var(--panel);border:1px solid var(--border);
  overflow:hidden;
}
.comp-table-head{
  display:grid;grid-template-columns:1fr 2fr 80px 90px 90px 70px;
  gap:0;padding:8px 14px;
  background:var(--bg2);border-bottom:1px solid var(--border);
}
.cth{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
.comp-row{
  display:grid;grid-template-columns:1fr 2fr 80px 90px 90px 70px;
  gap:0;padding:10px 14px;border-bottom:1px solid var(--border2);
  transition:.2s;align-items:center;
}
.comp-row:last-child{border-bottom:none}
.comp-row:hover{background:rgba(0,220,255,.04)}
.crd{font-size:11px;color:var(--text);line-height:1.3}
.crd-sub{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text2);margin-top:2px}
.status-pill{
  font-family:'Share Tech Mono',monospace;font-size:8px;
  padding:3px 7px;text-align:center;font-weight:bold;
  border:1px solid;display:inline-block;
}
.sp-ok{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.08)}
.sp-no{border-color:var(--red);color:var(--red);background:rgba(255,45,85,.08)}
.sp-wait{border-color:var(--yellow);color:var(--yellow);background:rgba(255,214,10,.08)}
.ch-num{font-family:'Orbitron',monospace;font-size:11px;font-weight:700}

/* ─ DISCIPLINAS VIEW ─ */
.disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:800px){.disc-grid{grid-template-columns:1fr}}

.disc-card{
  background:var(--panel);border:1px solid var(--border);
  padding:14px;position:relative;overflow:hidden;
  transition:.2s;
}
.disc-card:hover{border-color:rgba(0,220,255,.3);transform:translateY(-1px)}
.disc-period{
  font-family:'Share Tech Mono',monospace;font-size:8px;
  color:var(--text2);letter-spacing:2px;margin-bottom:6px;
}
.disc-code{
  font-family:'Share Tech Mono',monospace;font-size:8px;
  color:var(--dim);margin-bottom:4px;
}
.disc-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.disc-status{
  margin-top:8px;display:flex;align-items:center;gap:6px;
}
.disc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.d-green{background:var(--green);box-shadow:0 0 6px var(--green)}
.d-cyan{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.d-orange{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.d-purple{background:var(--purple);box-shadow:0 0 6px var(--purple)}
.d-yellow{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.disc-status-lbl{font-family:'Share Tech Mono',monospace;font-size:9px}
.disc-accent{position:absolute;top:0;left:0;bottom:0;width:3px}

/* ─ MÓDULOS STUDY VIEW ─ */
.study-layout{display:grid;grid-template-columns:1fr 300px;gap:14px}
@media(max-width:900px){.study-layout{grid-template-columns:1fr}}

.panel-box{background:var(--panel);border:1px solid var(--border);padding:14px}
.panel-title{
  font-family:'Orbitron',monospace;font-size:8px;color:var(--orange);
  letter-spacing:3px;margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid rgba(255,107,53,.2);
}
.topic-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--border2);
  animation:fadeSlide .4s ease both;
}
.topic-item:last-child{border-bottom:none}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.ti-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.ti-text{font-size:13px;color:var(--text);line-height:1.4;font-weight:500}
.ti-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);display:block;margin-top:2px}

.code-box{
  background:#020810;border:1px solid rgba(0,220,255,.12);
  padding:12px;margin-top:12px;
  font-family:'Share Tech Mono',monospace;font-size:10px;
  color:#7ec8e3;line-height:1.8;overflow-x:auto;white-space:pre;
}
.kw{color:var(--cyan)}.str{color:var(--green)}.cmt{color:var(--dim)}.fn{color:var(--orange)}.num{color:var(--yellow)}.cls{color:var(--purple)}

.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tag{font-family:'Share Tech Mono',monospace;font-size:8px;padding:3px 7px;border:1px solid;letter-spacing:1px}
.tc{border-color:var(--cyan2);color:var(--cyan2)}
.tg{border-color:var(--green);color:var(--green)}
.to{border-color:var(--orange);color:var(--orange)}
.tp{border-color:var(--purple);color:var(--purple)}
.ty{border-color:var(--yellow);color:var(--yellow)}

.alert-strip{
  margin-top:12px;padding:10px 12px;
  border-left:3px solid var(--yellow);
  background:rgba(255,214,10,.05);
  font-family:'Share Tech Mono',monospace;font-size:10px;
  color:var(--yellow);line-height:1.6;
}

/* CHECKPOINTS */
.cp-list{display:flex;flex-direction:column;gap:1px}
.cp-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;border-bottom:1px solid var(--border2);
  cursor:pointer;transition:.2s;
}
.cp-item:last-child{border-bottom:none}
.cp-item:hover{padding-left:4px}
.cp-box{
  width:14px;height:14px;border:1px solid var(--dim);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.cp-item.done .cp-box{border-color:var(--green);background:rgba(0,255,136,.12)}
.cp-tick{color:var(--green);font-size:10px;display:none;font-weight:bold}
.cp-item.done .cp-tick{display:block}
.cp-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text);transition:.2s;line-height:1.4}
.cp-item.done .cp-lbl{color:var(--dim);text-decoration:line-through}

/* TIPS */
.tip-item{
  display:flex;gap:8px;padding:7px 0;
  border-bottom:1px solid var(--border2);
  font-size:11px;color:var(--text);line-height:1.5;
}
.tip-item:last-child{border-bottom:none}
.tip-arrow{color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:10px;flex-shrink:0;margin-top:1px}

/* ── EDITABLE VALUES ── */
.editable-val {
  cursor: pointer;
  position: relative;
  transition: .2s;
}
.editable-val:hover {
  text-shadow: 0 0 12px var(--cyan), 0 0 24px rgba(0,220,255,.4) !important;
  opacity: .9;
}
.editable-val::after {
  content: '✎';
  position: absolute;
  top: -6px;
  right: -14px;
  font-size: 9px;
  color: var(--cyan);
  opacity: 0;
  transition: opacity .2s;
  font-family: sans-serif;
}
.editable-val:hover::after { opacity: .7; }

.edit-input-wrap {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(0,220,255,.08);
  border: 1px solid var(--cyan);
  padding: 2px 6px;
  box-shadow: 0 0 12px var(--glow-c);
}
.edit-input {
  font-family: 'Orbitron', monospace;
  font-size: inherit;
  font-weight: 700;
  color: var(--cyan);
  background: transparent;
  border: none;
  outline: none;
  width: 80px;
  text-align: center;
}
.edit-ok {
  font-size: 10px;
  color: var(--green);
  cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  padding: 0 3px;
}
.edit-ok:hover { color: #fff; }

/* ── NOTIFICATION ── */
#notif{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--panel2);border:1px solid var(--cyan);
  color:var(--cyan);font-family:'Orbitron',monospace;font-size:10px;
  padding:10px 20px;letter-spacing:2px;
  box-shadow:0 0 30px var(--glow-c);
  transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
  z-index:10000;white-space:nowrap;pointer-events:none;
}
#notif.show{transform:translateX(-50%) translateY(0)}
#notif.warn{border-color:var(--yellow);color:var(--yellow);box-shadow:0 0 30px var(--glow-o)}
#notif.ok{border-color:var(--green);color:var(--green);box-shadow:0 0 30px var(--glow-g)}

/* SECTION TITLE */
.view-title{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.vt-tag{
  font-family:'Share Tech Mono',monospace;font-size:8px;
  padding:3px 9px;border:1px solid var(--orange);color:var(--orange);
  letter-spacing:2px;flex-shrink:0;
}
.vt-h{
  font-family:'Orbitron',monospace;font-size:clamp(13px,2vw,18px);
  font-weight:900;color:var(--cyan);
  text-shadow:0 0 14px rgba(0,220,255,.35);letter-spacing:2px;
}
.vt-sub{font-size:11px;color:var(--text2);font-style:italic;margin-top:2px}
</style>
</head>
<body>
<div class="mesh"></div>

<div id="app">

<!-- ══════════════════ TITLEBAR ══════════════════ -->
<div id="titlebar">
  <div class="tb-logo">◈ MARCIO.SYS</div>
  <div class="tb-divider"></div>
  <div class="tb-status">

      <div class="av-b"></div><div class="av-b"></div><div class="av-b"></div>

  </div>
  <div class="tb-right">

      <div class="tb-time" id="tbTime">--:--:--</div>

      <button class="wc wc-r" title="Fechar" onclick="window.close()"></button>

<!-- ══════════════════ SIDEBAR ══════════════════ -->
<div id="sidebar">

  <!-- TIMER -->
  <div class="sb-timer">

      <svg class="ring-svg" viewBox="0 0 130 130">

      <div class="ring-inner">

      </div>
    </div>

      <button class="mpill active" onclick="setMode('focus',25)">25min</button>
      <button class="mpill" onclick="setMode('short',5)">5min</button>
      <button class="mpill" onclick="setMode('long',15)">15min</button>
    </div>
    <div class="t-btns">
      <button class="t-main" id="tBtn" onclick="toggleTimer()">INICIAR</button>
      <button class="t-rst" onclick="resetTimer()">RESET</button>
    </div>
    <div class="sess-row">
      <span class="sess-lbl">SESSÕES</span>
      <div class="sdots" id="sdots">
        <div class="sdot"></div><div class="sdot"></div>
        <div class="sdot"></div><div class="sdot"></div>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <div class="sb-nav-lbl">▸ Navegação</div>
  <div class="sb-nav" id="sbNav"></div>

  <!-- PROGRESS -->
  <div class="sb-prog">
    <div class="sb-sec-lbl">▸ Progresso Geral</div>
    <div id="sidebarProgress"></div>
  </div>
</div>

<!-- ══════════════════ MAIN ══════════════════ -->
<div id="main">
  <div id="tabbar"></div>
  <div id="content"></div>
</div>

</div>
<div id="notif"></div>

<script>
'use strict';

// ═════════════════════════════════════
//  PERSISTENT STATE
// ═════════════════════════════════════
const DEFAULT_STATE = {
  courseraC3: 100,          // C3 progress %
  courseraC3name: 'Introduction to Git and GitHub',
  courseraC3status: 'done', // done | active | next
  courseraC3label: 'CONCLUÍDO',
  courseraC3deadline: '',
  courseraC3lesson: 'Course 3 concluído com nota 89.37%',
  courseraC4: 100,
  courseraC5: 100,
  courseraC6: 100,
  courseraC7: 100,
  coursesCompleted: 7,      // TODOS os 7 cursos concluídos!
  horasTotal: 226,          // 226h confirmadas no portal (atualizado v5)
  horasNeeded: 170,
  discAtivas: 3,
  sidebarC3: 100,
  sidebarHoras: 100,
  sidebarDiscs: 70,
  sidebarDIO: 0,
  sidebarPosgrad: 10,
};

const STATE_VERSION = 'v5_09mai2026';
function loadState() {
  try {
    const ver = localStorage.getItem('mSysStateVer');
    if (ver !== STATE_VERSION) {
      localStorage.removeItem('mSysState3');
      localStorage.setItem('mSysStateVer', STATE_VERSION);
      return Object.assign({}, DEFAULT_STATE);
    }
    const saved = localStorage.getItem('mSysState3');
    return saved ? Object.assign({}, DEFAULT_STATE, JSON.parse(saved)) : Object.assign({}, DEFAULT_STATE);
  } catch(e) { return Object.assign({}, DEFAULT_STATE); }
}
function saveState() {
  localStorage.setItem('mSysState3', JSON.stringify(ST));
  rebuildSidebarProgress();
}

let ST = loadState();

// ─ Make a value editable on click ─
// el: the DOM element; key: STATE key; suffix: '%' or 'h' etc;
// isText: if true, it's a string not a number; onSave: callback
function makeEditable(el, key, suffix='', isText=false, onSave=null) {
  el.classList.add('editable-val');
  el.title = 'Clique para editar';
  el.addEventListener('click', function(e) {
    e.stopPropagation();
    if (el.querySelector('.edit-input-wrap')) return;
    const cur = ST[key];
    const orig = el.innerHTML;
    el.innerHTML = `<span class="edit-input-wrap">
      <input class="edit-input" type="${isText?'text':'number'}" value="${cur}" style="width:${isText?'160px':'60px'}">
      <span class="edit-ok">✓</span>
    </span>`;
    const inp = el.querySelector('.edit-input');
    inp.focus(); inp.select();
    function commit() {
      const val = isText ? inp.value.trim() : parseFloat(inp.value);
      if (isText ? val : !isNaN(val)) {
        ST[key] = isText ? val : (suffix==='%' ? Math.min(100,Math.max(0,val)) : val);
        saveState();
        notify('💾 SALVO: ' + key, 'ok');
        if (onSave) onSave(ST[key]);
        else switchView(activeView); // re-render current view
      } else {
        el.innerHTML = orig;
      }
    }
    inp.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter') commit();
      if (ev.key === 'Escape') el.innerHTML = orig;
    });
    inp.addEventListener('blur', function() {
      setTimeout(() => { if(el.querySelector('.edit-input')) el.innerHTML = orig; }, 200);
    });
    el.querySelector('.edit-ok').addEventListener('click', function(ev) {
      ev.stopPropagation(); commit();
    });
  });
}

// ═════════════════════════════════════
//  CLOCK
// ═════════════════════════════════════
const PT_DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const PT_MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function tickClock(){
  const n=new Date();
  document.getElementById('tbTime').textContent=
    `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('tbDate').textContent=
    `${PT_DAYS[n.getDay()]} ${n.getDate()} ${PT_MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}
const p=n=>String(n).padStart(2,'0');
setInterval(tickClock,1000); tickClock();
function toggleFS(){
  !document.fullscreenElement ? document.documentElement.requestFullscreen() : document.exitFullscreen();
}

// ═════════════════════════════════════
//  TIMER
// ═════════════════════════════════════
const CIRC=2*Math.PI*60; // ≈376.99
const rFill=document.getElementById('rFill');
rFill.style.strokeDasharray=CIRC;
rFill.style.strokeDashoffset=0;

let tTotal=25*60,tRemain=25*60,tRunning=false,tInterval=null,tMode='focus';
let sessions=parseInt(localStorage.getItem('mSess2')||'0');

function drawTimer(){
  document.getElementById('rDigits').textContent=`${p(Math.floor(tRemain/60))}:${p(tRemain%60)}`;
  rFill.style.strokeDashoffset=CIRC*(1-tRemain/tTotal);
  document.title=tRunning?`${p(Math.floor(tRemain/60))}:${p(tRemain%60)} — MARCIO.SYS`:'MARCIO.SYS — Study OS';
}

function setMode(m,mins){
  resetTimer(); tMode=m; tTotal=mins*60; tRemain=mins*60;
  document.querySelectorAll('.mpill').forEach((b,i)=>b.classList.toggle('active',['focus','short','long'][i]===m));
  const lbls={focus:'● FOCO',short:'◌ PAUSA',long:'◌ LONGA'};
  const cols={focus:'var(--cyan)',short:'var(--green)',long:'var(--yellow)'};
  document.getElementById('rLbl').textContent=lbls[m];
  rFill.style.stroke=cols[m];
  rFill.style.filter=`drop-shadow(0 0 8px ${cols[m]})`;
  drawTimer();
}

function toggleTimer(){
  if(tRunning){
    clearInterval(tInterval);tRunning=false;
    document.getElementById('tBtn').textContent='RETOMAR';
    document.getElementById('avBars').classList.add('stopped');
  } else {
    tRunning=true;
    document.getElementById('tBtn').textContent='PAUSAR';
    document.getElementById('avBars').classList.remove('stopped');
    tInterval=setInterval(()=>{
      if(tRemain<=0){
        clearInterval(tInterval);tRunning=false;
        document.getElementById('tBtn').textContent='INICIAR';
        document.getElementById('avBars').classList.add('stopped');
        if(tMode==='focus'){
          sessions=Math.min(sessions+1,4);
          localStorage.setItem('mSess2',sessions);
          updateDots();
          notify('🔥 SESSÃO CONCLUÍDA! DESCANSE.','ok');
          if(sessions===4)setTimeout(()=>notify('⚡ 4 POMODOROS! PAUSA LONGA RECOMENDADA','warn'),3500);
        } else {
          notify('⚡ PAUSA ENCERRADA — FOCO MÁXIMO!');
        }
        return;
      }
      tRemain--; drawTimer();
    },1000);
  }
}

function resetTimer(){
  clearInterval(tInterval);tRunning=false;tRemain=tTotal;
  document.getElementById('tBtn').textContent='INICIAR';
  document.getElementById('avBars').classList.add('stopped');
  drawTimer();
}

function updateDots(){
  document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('lit',i<sessions));
}

// Reset diário
const today=new Date().toDateString();
if(localStorage.getItem('mSessDate2')!==today){
  localStorage.setItem('mSessDate2',today);
  localStorage.setItem('mSess2','0');
  sessions=0;
}
updateDots(); drawTimer();

// ═════════════════════════════════════
//  NOTIFICATION
// ═════════════════════════════════════
function notify(msg,type=''){
  const n=document.getElementById('notif');
  n.textContent=msg; n.className=type?`show ${type}`:'show';
  setTimeout(()=>n.className='',4000);
}

// ═════════════════════════════════════
//  SIDEBAR PROGRESS (dynamic)
// ═════════════════════════════════════
function rebuildSidebarProgress() {
  const horaspct = Math.min(100, Math.round(ST.horasTotal / ST.horasNeeded * 100));
  const items = [
    {label: 'Coursera — 7/7 ✓ CERT.', val: '100%', fill: 100, cls:'pc'},
    {label: 'Horas Complementares', val: horaspct+'%', fill: horaspct, cls:'po'},
    {label: 'Disciplinas EAD', val: ST.sidebarDiscs+'%', fill: ST.sidebarDiscs, cls:'pp'},
    {label: 'DIO Back-End', val: ST.sidebarDIO+'%', fill: ST.sidebarDIO, cls:'pg'},
    {label: 'Pós-grad. EAD', val: ST.sidebarPosgrad+'%', fill: ST.sidebarPosgrad, cls:'py'},
  ];
  const el = document.getElementById('sidebarProgress');
  if (!el) return;
  el.innerHTML = items.map(it=>`
    <div class="prog-item">
      <div class="prog-row"><span>${it.label}</span><span>${it.val}</span></div>
      <div class="pbar"><div class="pfill ${it.cls}" style="width:${it.fill}%"></div></div>
    </div>
  `).join('');
}

// ═════════════════════════════════════
//  VIEWS DATA
// ═════════════════════════════════════
const VIEWS = [
  // ─ 0: DASHBOARD ─
  {
    id:'dash', navIcon:'⚡', navTitle:'Dashboard', navSub:'Visão Geral',
    tabLabel:'◈ Dashboard', tabDot:'',
    render:()=>renderDashboard()
  },
  // ─ 1: COURSERA ─
  {
    id:'coursera', navIcon:'🏆', navTitle:'Google IT Auto', navSub:'Coursera · 7/7 CONCLUÍDOS · CERTIFICADO',
    badge:'COMPLETO', badgeCls:'badge-done',
    tabLabel:'🏆 Coursera', tabDot:'',
    render:()=>renderCoursera()
  },
  // ─ 2: HORAS COMPLEMENTARES ─
  {
    id:'horas', navIcon:'📋', navTitle:'Horas Compl.', navSub:'226h / 170h · 133% ✓',
    badge:'100%', badgeCls:'badge-done',
    tabLabel:'📋 Horas Compl.', tabDot:'orange',
    render:()=>renderHoras()
  },
  // ─ 3: DISCIPLINAS ─
  {
    id:'discs', navIcon:'🎓', navTitle:'Disciplinas EAD', navSub:'Cruzeiro do Sul Virtual',
    badge:'', badgeCls:'',
    tabLabel:'🎓 Disciplinas', tabDot:'',
    render:()=>renderDiscs()
  },
  // ─ 4: GIT & GITHUB ─
  {
    id:'git', navIcon:'🌿', navTitle:'Git & GitHub', navSub:'Course 3 · 100% · Concluído ✓',
    badge:'CONCLUÍDO', badgeCls:'badge-done',
    tabLabel:'🌿 Git/GitHub', tabDot:'',
    render:()=>renderStudy('git')
  },
  // ─ 5: DEBUG ─
  {
    id:'debug', navIcon:'🐛', navTitle:'Troubleshooting', navSub:'Course 4 · 100% · Concluído ✓',
    badge:'CONCLUÍDO', badgeCls:'badge-done',
    tabLabel:'🐛 Debug', tabDot:'',
    render:()=>renderStudy('debug')
  },
  // ─ 6: AGENTES IA ─
  {
    id:'ia', navIcon:'🤖', navTitle:'Agentes de IA', navSub:'Faculdade · Concluída · Nota 9.5',
    badge:'CONCLUÍDO', badgeCls:'badge-done',
    tabLabel:'🤖 Agentes IA', tabDot:'',
    render:()=>renderStudy('ia')
  },
  // ─ 7: BACK-END ─
  {
    id:'backend', navIcon:'🐍', navTitle:'Python Back-End', navSub:'DIO Luizalabs · Pós-junho',
    badge:'EM BREVE', badgeCls:'badge-next',
    tabLabel:'🐍 Back-End', tabDot:'purple',
    render:()=>renderStudy('backend')
  },
];

// ═════════════════════════════════════
//  NAV + TAB RENDER
// ═════════════════════════════════════
let activeView=0;

function buildNav(){
  document.getElementById('sbNav').innerHTML=VIEWS.map((v,i)=>`
    <div class="nav-item${i===activeView?' active':''}" onclick="switchView(${i})">
      <span class="ni-icon">${v.navIcon}</span>
      <div class="ni-info">
        <div class="ni-title">${v.navTitle}</div>
        <div class="ni-sub">${v.navSub}</div>
      </div>
      ${v.badge?`<span class="ni-badge ${v.badgeCls}">${v.badge}</span>`:''}
    </div>
  `).join('');
}

function buildTabs(){
  document.getElementById('tabbar').innerHTML=VIEWS.map((v,i)=>`
    <button class="tab-btn${i===activeView?' active':''}" onclick="switchView(${i})">
      ${v.tabDot?`<span class="tab-dot ${v.tabDot}"></span>`:''}
      ${v.tabLabel}
    </button>
  `).join('');
}

function switchView(i){
  activeView=i;
  buildNav(); buildTabs();
  VIEWS[i].render();
}

// ═════════════════════════════════════
//  RENDER: DASHBOARD
// ═════════════════════════════════════
function renderDashboard(){
  const el=document.getElementById('content');
  const horaspct = (ST.horasTotal/ST.horasNeeded*100).toFixed(1);
  el.innerHTML=`
    <div class="view-title">
      <span class="vt-tag">OVERVIEW</span>
      <div>
        <div class="vt-h">◈ MARCIO.SYS — Central de Estudos</div>
        <div class="vt-sub">Engenharia de Software · Cruzeiro do Sul Virtual · Google IT Automation</div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="stat-card sc-cyan">

          <div class="horas-sub">EXCEDENTE</div>

          <div class="horas-num" style="color:var(--text2)">${needed}<span style="font-size:14px">h</span></div>
          <div class="horas-sub">EXIGIDO</div>

          <div>
            ${it.status==='no'?`

  const d=STUDY_DATA[id];
  const el=document.getElementById('content');
  const saved=JSON.parse(localStorage.getItem(d.cpKey)||'[]');

  el.innerHTML=`
    <div class="view-title">
      <span class="vt-tag">${d.tag}</span>
      <div>
        <div class="vt-h">${d.title}</div>
        <div class="vt-sub">${d.desc}</div>
      </div>
      <button onclick="${d.action.fn}"
        style="margin-left:auto;flex-shrink:0;font-family:'Orbitron',monospace;font-size:8px;font-weight:700;
          padding:8px 14px;border:1px solid var(--cyan);color:var(--cyan);
          background:rgba(0,220,255,.08);cursor:pointer;letter-spacing:2px;transition:.2s"
        onmouseover="this.style.background='rgba(0,220,255,.2)'"
        onmouseout="this.style.background='rgba(0,220,255,.08)'">${d.action.label}</button>
    </div>

    <div class="study-layout">
      <div>
        <div class="panel-box">
          <div class="panel-title">▸ TÓPICOS DO MÓDULO</div>
          ${d.topics.map((t,i)=>`
            <div class="topic-item" style="animation-delay:${i*.05}s">
              <span class="ti-icon">${t.icon}</span>
              <div>
                <span class="ti-text">${t.text}</span>
                <span class="ti-sub">${t.sub}</span>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="panel-box" style="margin-top:12px">
          <div class="panel-title">▸ CÓDIGO DE REFERÊNCIA</div>
          <div class="code-box">${d.code}</div>
        </div>

        <div class="tags-wrap">${d.tags.map(([t,c])=>`<span class="tag ${c}">${t}</span>`).join('')}</div>
        <div class="alert-strip">${d.alert}</div>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="panel-box">
          <div class="panel-title">▸ DICAS PRÁTICAS</div>
          ${d.tips.map((t,i)=>`
            <div class="tip-item" style="animation-delay:${i*.06}s">
              <span class="tip-arrow">▷</span>
              <span>${t}</span>
            </div>
          `).join('')}
        </div>

        <div class="panel-box">
          <div class="panel-title">▸ CHECKPOINTS — <span id="cpCount_${id}" style="color:var(--green)">${saved.length}/${d.cps.length}</span></div>
          <div class="cp-list" id="cpList_${id}">
            ${d.cps.map((c,i)=>`
              <div class="cp-item${saved.includes(i)?' done':''}" onclick="toggleCP('${d.cpKey}','${id}',${i},this)">
                <div class="cp-box"><span class="cp-tick">✓</span></div>
                <span class="cp-lbl">${c}</span>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:10px;height:3px;background:var(--dim2)">
            <div id="cpProg_${id}" style="height:100%;background:var(--green);transition:width .5s;width:${saved.length/d.cps.length*100}%"></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function toggleCP(key,id,idx,el){
  el.classList.toggle('done');
  const saved=JSON.parse(localStorage.getItem(key)||'[]');
  const pos=saved.indexOf(idx);
  pos===-1?saved.push(idx):saved.splice(pos,1);
  localStorage.setItem(key,JSON.stringify(saved));
  // Update counter + bar
  const d=STUDY_DATA[id];
  const pct=saved.length/d.cps.length*100;
  const cc=document.getElementById(`cpCount_${id}`);
  const cp=document.getElementById(`cpProg_${id}`);
  if(cc)cc.textContent=`${saved.length}/${d.cps.length}`;
  if(cp)cp.style.width=pct+'%';
  if(saved.length===d.cps.length) notify(`🏆 MÓDULO ${id.toUpperCase()} COMPLETO!`,'ok');
}
